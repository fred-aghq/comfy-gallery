services:
  backend:
    build:
      context: ./backend
      target: base
    restart: unless-stopped
    environment:
      GALLERY_DATABASE_URL: postgresql+asyncpg://gallery:${POSTGRES_PASSWORD:-gallery}@db:5432/comfy_gallery
      GALLERY_MEDIA_ROOT: /media
      GALLERY_THUMBNAIL_DIR: /thumbnails
    volumes:
      - ${MEDIA_ROOT:?MEDIA_ROOT must be set}:/media:ro
      - thumbnails:/thumbnails
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gallery

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: prod
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gallery

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comfy_gallery
      POSTGRES_USER: gallery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gallery}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery -d comfy_gallery"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gallery

volumes:
  pgdata:
  thumbnails:

networks:
  gallery:
    driver: bridge
